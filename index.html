<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alek Klem</title>
  <style>
    @font-face {
      font-family: 'RetroByte';
      src: url('root_resources/RetroByte.ttf') format('truetype');
    }
  </style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #060605; }

    #morpheus-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
      filter: contrast(1.25) brightness(0.92);
    }

    /* CRT scanlines */
    .scanlines {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
    }

    /* CRT vignette — darkens edges, keeps centre sharp */
    .vignette {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 40%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* ── Hand buttons — transparent click targets only ─── */
    .hand-btn {
      position: fixed;
      z-index: 20;
      border-radius: 0;
      cursor: pointer;
      text-decoration: none;
      background: transparent;
      pointer-events: none;
      /* size set by JS */
    }

    /* ── Side labels ─────────────────────────────── */
    .corner-label {
      position: fixed;
      bottom: 50%;
      z-index: 20;
      font-family: 'RetroByte', monospace;
      font-size: clamp(2.8rem, 5.5vw, 8rem);
      text-decoration: none;
      image-rendering: pixelated;
      transition: opacity 0.08s steps(2);
      opacity: 0;
      pointer-events: none;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .corner-label--left  { left: 2.4rem;  color: #c8c5bc; }
    .corner-label--right { right: 4.5rem; color: #c8c5bc; }


    #chosen-msg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      font-family: 'RetroByte', monospace;
      font-size: clamp(0.7rem, 1.4vw, 1.3rem);
      text-align: center;
      line-height: 2.2;
      letter-spacing: 0.15em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      white-space: nowrap;
    }

    #blackout {
      position: fixed; inset: 0; background: #000;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      .hand-btn { animation: none !important; }
    }
  </style>
</head>
<body>

<div id="chosen-msg"></div>
<div id="blackout"></div>
<canvas id="morpheus-canvas"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<a href="/horeca" id="btn-left"  class="hand-btn"></a>
<a href="/ai"     id="btn-right" class="hand-btn"></a>

<a href="/horeca" class="corner-label corner-label--left">horeca</a>
<a href="/ai"     class="corner-label corner-label--right">tech</a>


<script>
const morphCanvas = document.getElementById('morpheus-canvas');
const mCtx = morphCanvas.getContext('2d');

// ── Hand positions as fraction of displayed image ───────
const HAND_L = { x: 0.295, y: 0.79 };
const HAND_R = { x: 0.720, y: 0.79 };

// ── Pixelation ──────────────────────────────────────────
const PIXEL_COLS = 72;
const FRAME_DIR   = 'root_resources/opening_hands_animation/';
const FRAME_COUNT = 15;

let pixelatedCache  = null;
let pixelatedFrames = new Array(FRAME_COUNT).fill(null);
let currentFrame    = 0;
let srcNaturalRatio = 0.833;

function buildFrameCache(img, idx) {
  if (idx === 0) {
    srcNaturalRatio = img.height / img.width;
    buildConeCaches();
    positionHandBtns();
  }
  // Store raw image — already pixel art, no downscale needed
  pixelatedFrames[idx] = img;
  if (idx === 0) {
    pixelatedCache = img;
    startEntranceAnimation();
  }
}

for (let i = 0; i < FRAME_COUNT; i++) {
  const img = new Image();
  const idx = i;
  img.onload  = () => buildFrameCache(img, idx);
  img.onerror = () => console.warn(`Frame ${idx + 1} not found`);
  img.src = `${FRAME_DIR}frame_${String(i + 1).padStart(2, '0')}.png`;
}

// ── Smiling animation ─────────────────────────────────────
const SMILE_DIR         = 'root_resources/smiling_animation/';
const SMILE_FRAME_COUNT = 6;
const SMILE_DURATION    = 500; // ms for full forward/reverse sweep

let smileFrames    = new Array(SMILE_FRAME_COUNT).fill(null);
let smileProgress  = 0;   // 0 = neutral, 1 = full smile
let smileDirection = 0;   // 1 = forward, -1 = reverse, 0 = stopped
let smileLocked    = false;
let smileAnimId    = null;
let smileLastTime  = null;

for (let i = 0; i < SMILE_FRAME_COUNT; i++) {
  const img = new Image();
  const idx = i;
  img.onload  = () => { smileFrames[idx] = img; };
  img.onerror = () => console.warn(`Smile frame ${idx + 1} not found`);
  img.src = `${SMILE_DIR}frame_${String(i + 1).padStart(2, '0')}.png`;
}

function tickSmile(now) {
  if (smileLastTime !== null) {
    const dt    = now - smileLastTime;
    const delta = dt / SMILE_DURATION;
    smileProgress += smileDirection * delta;
    if (smileProgress >= 1) { smileProgress = 1; smileDirection = 0; }
    if (smileProgress <= 0) { smileProgress = 0; smileDirection = 0; }
  }
  smileLastTime = now;
  if (smileDirection !== 0) smileAnimId = requestAnimationFrame(tickSmile);
  else smileAnimId = null;
}

function startSmile() {
  if (smileLocked) return;
  smileDirection = 1;
  smileLastTime  = null;
  if (smileAnimId) cancelAnimationFrame(smileAnimId);
  smileAnimId = requestAnimationFrame(tickSmile);
}

function reverseSmile() {
  if (smileLocked) return;
  smileDirection = -1;
  smileLastTime  = null;
  if (smileAnimId) cancelAnimationFrame(smileAnimId);
  smileAnimId = requestAnimationFrame(tickSmile);
}

function lockSmile() {
  smileLocked    = true;
  smileDirection = 0;
  smileProgress  = 1;
  if (smileAnimId) cancelAnimationFrame(smileAnimId);
  smileAnimId = null;
}

function resetSmile() {
  smileLocked    = false;
  smileDirection = 0;
  smileProgress  = 0;
  smileLastTime  = null;
  if (smileAnimId) cancelAnimationFrame(smileAnimId);
  smileAnimId = null;
}

function getCurrentDisplayFrame() {
  if (smileProgress > 0 && smileFrames[0]) {
    const idx = Math.min(
      Math.round(smileProgress * (SMILE_FRAME_COUNT - 1)),
      SMILE_FRAME_COUNT - 1
    );
    return smileFrames[idx] || pixelatedCache;
  }
  return pixelatedCache;
}

// ── Layout helper ────────────────────────────────────────
function getDisplayRect() {
  const W = window.innerWidth, H = window.innerHeight;
  const displayH = Math.round(H * 0.88);
  const displayW = Math.round(displayH / srcNaturalRatio);
  return {
    dx: Math.round((W - displayW) / 2),
    dy: Math.round((H - displayH) / 2),
    displayW, displayH,
  };
}

// ── Position hand buttons ────────────────────────────────
function positionHandBtns() {
  const { dx, dy, displayW, displayH } = getDisplayRect();
  const size  = Math.max(56, Math.round(displayW * 0.13));
  const coneH = Math.round(size * 2.4);

  function place(id, hx, hy) {
    const el = document.getElementById(id);
    el.style.width  = size   + 'px';
    el.style.height = coneH  + 'px';
    el.style.left   = Math.round(dx + hx * displayW - size  / 2) + 'px';
    el.style.top    = Math.round(dy + hy * displayH - coneH)     + 'px';
  }

  place('btn-left',  HAND_L.x, HAND_L.y);
  place('btn-right', HAND_R.x, HAND_R.y);
}

// ── Resize ───────────────────────────────────────────────
function resize() {
  morphCanvas.width  = window.innerWidth;
  morphCanvas.height = window.innerHeight;
  positionHandBtns();
}

// ── Animation state ───────────────────────────────────────
let sinkProgress = 0; // 0 = normal, 1 = fully below viewport
let riseProgress = 1; // 1 = fully below (entrance), 0 = normal

// ── Pixelated cone caches ────────────────────────────────
// Low-res canvases scaled up with nearest-neighbour = pixel art look
const CONE_PX_W = 8, CONE_PX_H = 22;
let coneCacheL = null, coneCacheR = null;
let coneOpacity = 0;
let hoverLeft = false, hoverRight = false;

// Cone jitter — tiny random integer offsets updated at ~8fps
let coneJitterL = { x: 0, y: 0 };
let coneJitterR = { x: 0, y: 0 };
let lastJitterTime = 0;
const JITTER_INTERVAL = 220; // ms between jitter updates

function updateJitter(t) {
  if (t - lastJitterTime < JITTER_INTERVAL) return;
  lastJitterTime = t;
  const pick = () => (Math.floor(Math.random() * 5) - 2); // -2 to +2
  coneJitterL = { x: pick(), y: pick() };
  coneJitterR = { x: pick(), y: pick() };
}

function buildConeCaches() {
  function make(r, g, b) {
    const c = document.createElement('canvas');
    c.width = CONE_PX_W; c.height = CONE_PX_H;
    const ctx = c.getContext('2d');
    const cx = CONE_PX_W / 2;

    // Linear gradient: bright at base (bottom), fades to transparent at tip (top)
    const grad = ctx.createLinearGradient(0, CONE_PX_H, 0, 0);
    grad.addColorStop(0,   `rgba(${r},${g},${b},0.5)`);
    grad.addColorStop(0.45,`rgba(${r},${g},${b},0.25)`);
    grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;

    // Tapered cone: tip at top, rounded bottom corners.
    const rad = 4;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(CONE_PX_W, CONE_PX_H - rad);
    ctx.arcTo(CONE_PX_W, CONE_PX_H, CONE_PX_W - rad, CONE_PX_H, rad);
    ctx.lineTo(rad, CONE_PX_H);
    ctx.arcTo(0, CONE_PX_H, 0, CONE_PX_H - rad, rad);
    ctx.closePath();
    ctx.fill();
    return c;
  }
  coneCacheL = make(255, 20, 20);
  coneCacheR = make(0, 210, 255);
}

function drawCones(sinkY) {
  if (coneOpacity <= 0 || !coneCacheL) return;
  const { dx, dy, displayW, displayH } = getDisplayRect();
  const size  = Math.max(56, Math.round(displayW * 0.13));
  const coneH = Math.round(size * 2.4);

  mCtx.imageSmoothingEnabled = false;

  mCtx.globalAlpha = coneOpacity * (hoverLeft ? 1.0 : 0.82);
  mCtx.drawImage(coneCacheL,
    Math.round(dx + HAND_L.x * displayW - size / 2) + coneJitterL.x,
    Math.round(dy + HAND_L.y * displayH - coneH) + sinkY + coneJitterL.y,
    size, coneH);

  mCtx.globalAlpha = coneOpacity * (hoverRight ? 1.0 : 0.82);
  mCtx.drawImage(coneCacheR,
    Math.round(dx + HAND_R.x * displayW - size / 2) + coneJitterR.x,
    Math.round(dy + HAND_R.y * displayH - coneH) + sinkY + coneJitterR.y,
    size, coneH);

  mCtx.imageSmoothingEnabled = true;
  mCtx.globalAlpha = 1;
}

// Hover listeners — also drive corner label visibility
const labelLeft  = document.querySelector('.corner-label--left');
const labelRight = document.querySelector('.corner-label--right');

document.getElementById('btn-left').addEventListener('mouseenter', () => {
  hoverLeft = true;
  labelLeft.style.transition = 'opacity 0.4s ease';
  labelLeft.style.opacity = '1';
  startSmile();
});
document.getElementById('btn-left').addEventListener('mouseleave', () => {
  hoverLeft = false;
  labelLeft.style.transition = 'opacity 0.4s ease';
  labelLeft.style.opacity = '0';
  reverseSmile();
});
document.getElementById('btn-right').addEventListener('mouseenter', () => {
  hoverRight = true;
  labelRight.style.transition = 'opacity 0.4s ease';
  labelRight.style.opacity = '1';
  startSmile();
});
document.getElementById('btn-right').addEventListener('mouseleave', () => {
  hoverRight = false;
  labelRight.style.transition = 'opacity 0.4s ease';
  labelRight.style.opacity = '0';
  reverseSmile();
});

// ── Draw ─────────────────────────────────────────────────
function drawMorpheus(t) {
  const W = morphCanvas.width, H = morphCanvas.height;
  mCtx.clearRect(0, 0, W, H);

  const frame = getCurrentDisplayFrame();
  if (!frame) return;

  const { dx, dy, displayW, displayH } = getDisplayRect();
  const breathe = Math.round(Math.sin(t * 0.00052) * 2.5);
  const base    = 0.85 + Math.sin(t * 0.00065) * 0.05;

  // Sink/rise — slide relative to bottom of viewport
  const combinedProgress = sinkProgress + riseProgress;
  const sinkY = Math.round((H - dy + 20) * combinedProgress);

  mCtx.globalAlpha = base;
  mCtx.imageSmoothingEnabled = false;
  mCtx.drawImage(frame, dx, dy + breathe + sinkY, displayW, displayH);
  mCtx.imageSmoothingEnabled = true;
  mCtx.globalAlpha = 1;

  updateJitter(t);
  drawCones(sinkY + breathe);
}

function loop(t) {
  drawMorpheus(t);
  requestAnimationFrame(loop);
}

// ── Opening-hands frame animation ────────────────────────
function playOpeningAnimation() {
  const totalDuration = 3000;
  const start = performance.now();
  function step(now) {
    const elapsed = now - start;
    const idx = Math.min(Math.floor(elapsed / totalDuration * FRAME_COUNT), FRAME_COUNT - 1);
    if (pixelatedFrames[idx]) {
      currentFrame   = idx;
      pixelatedCache = pixelatedFrames[idx];
    }
    if (elapsed < totalDuration) {
      requestAnimationFrame(step);
    } else {
      currentFrame   = FRAME_COUNT - 1;
      pixelatedCache = pixelatedFrames[FRAME_COUNT - 1] || pixelatedCache;
      animateConeIn();
    }
  }
  requestAnimationFrame(step);
}

// ── Neon flicker cone entrance ────────────────────────────
function animateConeIn() {
  const duration = 2000;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    if (p < 0.65) {
      // Flicker phase: random on/off with rising probability
      coneOpacity = Math.random() < p * 1.5 ? p * 0.9 : 0;
    } else {
      // Settle: smoothly ramp to 1
      const settle = (p - 0.65) / 0.35;
      coneOpacity = 0.55 + settle * 0.45;
    }
    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      coneOpacity = 1;
      document.getElementById('btn-left').style.pointerEvents  = 'auto';
      document.getElementById('btn-right').style.pointerEvents = 'auto';
    }
  }
  requestAnimationFrame(step);
}

// ── Entrance animation ────────────────────────────────────
function startEntranceAnimation() {
  const duration = 3200;
  const start = performance.now();
  function riseStep(now) {
    const p = Math.min((now - start) / duration, 1);
    riseProgress = (1 - p) * (1 - p); // ease-out: pops up fast, settles gently
    if (p < 1) {
      requestAnimationFrame(riseStep);
    } else {
      riseProgress = 0;
      // Opening hands animation, then neon flicker for cones
      playOpeningAnimation();
    }
  }
  requestAnimationFrame(riseStep);
}

// ── Exit animation ────────────────────────────────────────
function startExitAnimation(url) {
  document.getElementById('btn-left').style.pointerEvents  = 'none';
  document.getElementById('btn-right').style.pointerEvents = 'none';
  // Phase 1: fade out cones (canvas) + labels
  const fadeStart = performance.now();
  const fadeDur = 1600;
  function coneFadeStep(now) {
    const p = Math.min((now - fadeStart) / fadeDur, 1);
    coneOpacity = 1 - p;
    if (p < 1) requestAnimationFrame(coneFadeStep);
    else coneOpacity = 0;
  }
  requestAnimationFrame(coneFadeStep);

  document.querySelectorAll('.corner-label').forEach(el => {
    el.style.transition = 'opacity 1.6s ease';
    el.style.opacity = '0';
  });

  // Phase 2: sink image below viewport (~2000ms, ease-in)
  setTimeout(() => {
    const duration = 2000;
    const start = performance.now();
    function shrinkStep(now) {
      const p = Math.min((now - start) / duration, 1);
      sinkProgress = p * p; // ease-in
      if (p < 1) { requestAnimationFrame(shrinkStep); }
      else {
        // Phase 3: blackout and navigate
        const blackout = document.getElementById('blackout');
        blackout.style.opacity = '1';
        setTimeout(() => { window.location.href = url; }, 350);
      }
    }
    requestAnimationFrame(shrinkStep);
  }, 1800);
}

document.getElementById('btn-left').addEventListener('click',  e => { e.preventDefault(); lockSmile(); startExitAnimation(e.currentTarget.href); });
document.getElementById('btn-right').addEventListener('click', e => { e.preventDefault(); lockSmile(); startExitAnimation(e.currentTarget.href); });

function resetState() {
  sinkProgress = 0;
  riseProgress = 0;
  coneOpacity  = 1;
  currentFrame   = FRAME_COUNT - 1;
  pixelatedCache = pixelatedFrames[FRAME_COUNT - 1] || pixelatedCache;
  resetSmile();
  document.getElementById('btn-left').style.pointerEvents  = 'auto';
  document.getElementById('btn-right').style.pointerEvents = 'auto';
  const msg = document.getElementById('chosen-msg');
  msg.style.transition = 'none'; msg.style.opacity = '0';
  const blackout = document.getElementById('blackout');
  blackout.style.transition = 'none';
  blackout.style.opacity = '1';
  document.querySelectorAll('.corner-label').forEach(el => {
    el.style.transition = 'none';
    el.style.opacity = '0';
  });
  // Fade out the blackout overlay
  setTimeout(() => {
    blackout.style.transition = 'opacity 0.6s ease';
    blackout.style.opacity = '0';
  }, 50);
}

// Only reset on back-navigation (persisted = restored from bfcache).
// Fresh loads: CSS opacity:0 + entrance animation handle everything.
window.addEventListener('pageshow', e => { if (e.persisted) resetState(); });

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);
</script>
</body>
</html>
